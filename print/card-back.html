<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050505; margin: 0; font-family: 'Space Grotesk', sans-serif; }
  .card { width: 100vw; height: 100vh; background: #050505; display: flex; flex-direction: column; justify-content: center; padding: 0 120px; position: relative; overflow: hidden; }
  .accent-left { position: absolute; top: 0; left: 0; width: 8px; height: 100%; background: linear-gradient(180deg, #008fb3, #00d4ff, #008fb3); }
  .glow { position: absolute; top: 50%; right: 0; transform: translateY(-50%); width: 600px; height: 400px; background: radial-gradient(ellipse, rgba(0,212,255,0.04) 0%, transparent 70%); }
  .name { font-size: 48px; font-weight: 700; color: white; margin-bottom: 8px; }
  .title { font-size: 22px; font-weight: 500; color: #00d4ff; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 50px; }
  .divider { width: 80px; height: 2px; background: linear-gradient(90deg, #00d4ff, transparent); margin-bottom: 50px; }
  .info-row { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
  .info-row svg { width: 28px; height: 28px; stroke: #00d4ff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .info-text { font-size: 28px; font-weight: 500; color: rgba(255,255,255,0.7); }
  .services { margin-top: 50px; display: flex; flex-wrap: wrap; gap: 12px 30px; }
  .svc { font-size: 18px; color: rgba(255,255,255,0.35); font-weight: 500; }
  .svc::before { content: ''; display: inline-block; width: 6px; height: 6px; background: #00d4ff; transform: rotate(45deg); margin-right: 10px; vertical-align: middle; }
</style></head><body>
<div class="card">
  <div class="accent-left"></div><div class="glow"></div>
  <div class="name">Alpha Railings</div>
  <div class="title">Licensed &amp; Insured &bull; MA, NH, ME, RI, FL</div>
  <div class="divider"></div>
  <div class="info-row"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg><span class="info-text">(754) 318-2099</span></div>
  <div class="info-row"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg><span class="info-text">alpharailings.com</span></div>
  <div class="info-row"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span class="info-text">support@alpharailings.com</span></div>
  <div class="services">
    <span class="svc">Glass Railings</span><span class="svc">Cable Railings</span><span class="svc">Iron Railings</span><span class="svc">Staircases</span><span class="svc">Gates &amp; Fences</span><span class="svc">Shower Doors</span><span class="svc">Glass Partitions</span><span class="svc">Commercial</span>
  </div>
</div>
</body></html>
